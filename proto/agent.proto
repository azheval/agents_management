// api/agent.proto
syntax = "proto3";

package agent_management;

option go_package = "agent-management/pkg/api";

service AgentService {
  rpc RegisterAgent (RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc StreamLogs (stream LogEntry) returns (StreamLogsResponse);
  rpc SubmitTaskResult (SubmitTaskResultRequest) returns (SubmitTaskResultResponse);
  rpc UploadTaskFile (stream UploadTaskFileRequest) returns (UploadTaskFileResponse);
}

message RegisterAgentRequest {
  string agent_id = 1;
  string hostname = 2;
  string os = 3;
  string arch = 4;
  string agent_version = 5;
  repeated string ip_addresses = 6;
}

message RegisterAgentResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string agent_id = 1;
  int64 timestamp = 2;
  float cpu_usage = 3;
  float ram_usage = 4;
  map<string, float> disk_usage = 5;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
}

message LogEntry {
  string agent_id = 1;
  string task_id = 2;
  int64 timestamp = 3;
  string level = 4; // INFO, WARN, ERROR
  string message = 5;
}

message StreamLogsResponse {
  bool success = 1;
  string message = 2;
}

enum TaskStatus {
  SUCCESS = 0;
  FAILED = 1;
  TIMED_OUT = 2;
  // Дополнительные статусы могут быть добавлены
}

message SubmitTaskResultRequest {
  string agent_id = 1;
  string task_id = 2;
  TaskStatus status = 3;
  int32 exit_code = 4;
  string output = 5;
  int64 duration_ms = 6;
}

message SubmitTaskResultResponse {
  bool success = 1;
  string message = 2;
}

message UploadTaskFileRequest {
  string agent_id = 1;
  string task_id = 2;
  bytes content = 3;
}

message UploadTaskFileResponse {
  bool success = 1;
  string message = 2;
  int64 bytes_received = 3;
}
